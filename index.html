<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10×10 Tic-Tac-Toe — 5 in a row</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cell: 56px; --gap: 4px;
    --bg: #f8f8f6; --surface: #ffffff; --surface2: #f1f0ec;
    --border: rgba(0,0,0,0.12); --text: #1a1a1a; --muted: #666;
    --blue: #185FA5; --red: #A32D2D;
    --green-bg: #C0DD97; --green-text: #27500A;
    --radius: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a; --surface: #262626; --surface2: #2e2e2e;
      --border: rgba(255,255,255,0.12); --text: #f0f0ee; --muted: #aaa;
      --blue: #5aa3e8; --red: #e07070;
    }
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 1.5rem;
  }
  h1 { font-size: 1.5rem; font-weight: 500; margin-bottom: 0.25rem; }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; }
  #status-bar {
    display: flex; align-items: center; justify-content: space-between;
    width: calc(10 * var(--cell) + 9 * var(--gap)); max-width: 100%;
    margin-bottom: 8px;
  }
  #status { font-size: 15px; font-weight: 500; }
  #scores { display: flex; gap: 16px; font-size: 13px; color: var(--muted); }
  #scores span { font-weight: 600; color: var(--text); }

  #think-bar {
    width: calc(10 * var(--cell) + 9 * var(--gap)); max-width: 100%;
    margin: 0 auto 6px;
    display: flex; align-items: center; gap: 10px;
    height: 20px;
    opacity: 0; transition: opacity 0.15s;
  }
  #think-bar.active { opacity: 1; }
  #phase-label {
    font-size: 12px; color: var(--muted);
    white-space: nowrap; min-width: 220px;
  }
  #progress-wrap {
    flex: 1; height: 4px;
    background: rgba(0,0,0,0.08);
    border-radius: 2px; overflow: hidden;
  }
  @media (prefers-color-scheme: dark) {
    #progress-wrap { background: rgba(255,255,255,0.1); }
  }
  #progress-bar {
    height: 100%; width: 0%;
    background: var(--blue);
    border-radius: 2px;
    transition: width 0.08s linear;
  }
  #progress-wrap.indeterminate #progress-bar {
    width: 35%;
    animation: slide 1.1s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { margin-left: -35%; }
    100% { margin-left: 100%; }
  }

  #board { display: grid; grid-template-columns: repeat(10, var(--cell)); gap: var(--gap); }
  .cell {
    width: var(--cell); height: var(--cell);
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 500; cursor: pointer;
    transition: background 0.1s; user-select: none;
  }
  .cell:hover:not(.taken) { background: var(--surface); }
  .cell.taken { cursor: default; }
  .cell.x-cell { color: var(--blue); }
  .cell.o-cell { color: var(--red); }
  .cell.win-cell { background: var(--green-bg); color: var(--green-text); }
  #reset-btn {
    margin-top: 14px; padding: 7px 24px; font-size: 14px;
    border-radius: var(--radius); border: 0.5px solid var(--border);
    background: var(--surface); color: var(--text); cursor: pointer; font-family: inherit;
    transition: background 0.1s;
  }
  #reset-btn:hover { background: var(--surface2); }
  @media (max-width: 640px) {
    :root { --cell: 32px; --gap: 2px; }
    .cell { font-size: 14px; }
    h1 { font-size: 1.2rem; }
    #phase-label { min-width: 0; }
  }
</style>
</head>
<body>
<h1>10×10 Tic-Tac-Toe</h1>
<p class="subtitle">Get 5 in a row to win &nbsp;·&nbsp; You are X &nbsp;·&nbsp; AI is O (strong)</p>

<div id="status-bar">
  <div id="status">Your turn (X)</div>
  <div id="scores">You: <span id="p-score">0</span> &nbsp; AI: <span id="ai-score">0</span> &nbsp; Draw: <span id="d-score">0</span></div>
</div>

<div id="think-bar">
  <span id="phase-label"></span>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
</div>

<div id="board" role="grid" aria-label="10 by 10 game board"></div>
<button id="reset-btn">New game</button>

<script>
const ROWS=10,COLS=10,WIN=5,HUMAN=1,AI=2,EMPTY=0,INF=1e9;
let board,gameOver,humanTurn,scores={p:0,ai:0,d:0};
let transTable=new Map();
const boardEl=document.getElementById('board');
const statusEl=document.getElementById('status');
const thinkBar=document.getElementById('think-bar');
const phaseLabel=document.getElementById('phase-label');
const progressWrap=document.getElementById('progress-wrap');
const progressBar=document.getElementById('progress-bar');

function setPhase(text){
  thinkBar.classList.add('active');
  phaseLabel.textContent=text;
  progressWrap.classList.add('indeterminate');
  progressBar.style.width='';
}
function hideThinkBar(){
  progressWrap.classList.remove('indeterminate');
  progressBar.style.width='100%';
  setTimeout(()=>{
    thinkBar.classList.remove('active');
    progressBar.style.width='0%';
    phaseLabel.textContent='';
  },250);
}

function init(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(EMPTY));
  gameOver=false;humanTurn=true;transTable.clear();
  thinkBar.classList.remove('active');
  progressWrap.classList.remove('indeterminate');
  progressBar.style.width='0%';
  phaseLabel.textContent='';
  renderBoard();statusEl.textContent='Your turn (X)';
}

function renderBoard(winCells){
  const wSet=new Set((winCells||[]).map(([r,c])=>r+','+c));
  boardEl.innerHTML='';
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const div=document.createElement('div');
    div.className='cell';
    div.setAttribute('role','gridcell');
    if(board[r][c]===HUMAN){div.textContent='X';div.classList.add('taken','x-cell');div.setAttribute('aria-label',`X at row ${r+1} column ${c+1}`);}
    else if(board[r][c]===AI){div.textContent='O';div.classList.add('taken','o-cell');div.setAttribute('aria-label',`O at row ${r+1} column ${c+1}`);}
    else div.setAttribute('aria-label',`Empty row ${r+1} column ${c+1}`);
    if(wSet.has(r+','+c))div.classList.add('win-cell');
    div.dataset.r=r;div.dataset.c=c;
    div.addEventListener('click',onCellClick);
    boardEl.appendChild(div);
  }
}

function onCellClick(e){
  if(!humanTurn||gameOver)return;
  const r=+e.currentTarget.dataset.r,c=+e.currentTarget.dataset.c;
  if(board[r][c]!==EMPTY)return;
  board[r][c]=HUMAN;
  const win=checkWin(HUMAN);
  if(win){renderBoard(win);endGame('You win! 🎉','p');return;}
  if(isDraw()){renderBoard();endGame("It's a draw!",'d');return;}
  renderBoard();humanTurn=false;
  statusEl.textContent='AI is thinking…';
  setPhase('Checking win moves…');
  setTimeout(aiMove,60);
}

function aiMove(){
  const filled=board.flat().filter(v=>v!==EMPTY).length;
  if(filled===0){
    board[4][5]=AI;hideThinkBar();
    renderBoard();humanTurn=true;statusEl.textContent='Your turn (X)';return;
  }

  const cands=getCandidates();

  for(const [r,c] of cands){
    board[r][c]=AI;
    if(checkWin(AI)){
      const win=checkWin(AI);
      hideThinkBar();renderBoard(win);endGame('AI wins! 🤖','ai');return;
    }
    board[r][c]=EMPTY;
  }

  setPhase('Scanning for threats to block…');
  for(const [r,c] of cands){
    board[r][c]=HUMAN;
    if(checkWin(HUMAN)){
      board[r][c]=EMPTY;board[r][c]=AI;
      hideThinkBar();renderBoard();humanTurn=true;statusEl.textContent='Your turn (X)';return;
    }
    board[r][c]=EMPTY;
  }

  setPhase('Hunting for fork opportunities…');
  for(const [r,c] of cands){
    board[r][c]=AI;
    const{fourOpen}=getThreatCounts(AI);
    board[r][c]=EMPTY;
    if(fourOpen>=1){
      board[r][c]=AI;
      hideThinkBar();
      const win=checkWin(AI);
      if(win){renderBoard(win);endGame('AI wins! 🤖','ai');return;}
      renderBoard();humanTurn=true;statusEl.textContent='Your turn (X)';return;
    }
  }
  for(const [r,c] of cands){
    board[r][c]=HUMAN;
    const{fourOpen}=getThreatCounts(HUMAN);
    board[r][c]=EMPTY;
    if(fourOpen>=1){
      board[r][c]=AI;
      hideThinkBar();renderBoard();humanTurn=true;statusEl.textContent='Your turn (X)';return;
    }
  }
  for(const [r,c] of cands){
    board[r][c]=AI;
    const{threeOpen}=getThreatCounts(AI);
    board[r][c]=EMPTY;
    if(threeOpen>=2){
      board[r][c]=AI;
      hideThinkBar();
      const win=checkWin(AI);
      if(win){renderBoard(win);endGame('AI wins! 🤖','ai');return;}
      renderBoard();humanTurn=true;statusEl.textContent='Your turn (X)';return;
    }
  }

  const ordered=orderMoves(cands);
  const depth=cands.length>30?3:cands.length>15?4:5;
  setPhase(`Thinking ${depth} moves ahead…`);

  setTimeout(()=>{
    let best=-INF,bestMove=ordered[0];
    for(const [r,c] of ordered){
      board[r][c]=AI;
      const val=minimax(depth,false,-INF,INF);
      board[r][c]=EMPTY;
      if(val>best){best=val;bestMove=[r,c];}
      if(best>=500000)break;
    }
    board[bestMove[0]][bestMove[1]]=AI;
    hideThinkBar();
    const win=checkWin(AI);
    if(win){renderBoard(win);endGame('AI wins! 🤖','ai');return;}
    if(isDraw()){renderBoard();endGame("It's a draw!",'d');return;}
    renderBoard();humanTurn=true;statusEl.textContent='Your turn (X)';
  },30);
}

function endGame(msg,key){
  gameOver=true;scores[key]++;
  document.getElementById('p-score').textContent=scores.p;
  document.getElementById('ai-score').textContent=scores.ai;
  document.getElementById('d-score').textContent=scores.d;
  statusEl.textContent=msg;
}

function isDraw(){return board.every(row=>row.every(c=>c!==EMPTY));}

function checkWin(player){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(board[r][c]!==player)continue;
    for(const [dr,dc] of dirs){
      const cells=[[r,c]];
      for(let k=1;k<WIN;k++){
        const nr=r+dr*k,nc=c+dc*k;
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS||board[nr][nc]!==player)break;
        cells.push([nr,nc]);
      }
      if(cells.length===WIN)return cells;
    }
  }
  return null;
}

function boardKey(){return board.map(r=>r.join('')).join('|');}

function countOpen(r,c,dr,dc,player){
  let count=0,openL=false,openR=false;
  const pr=r-dr,pc=c-dc;
  if(pr>=0&&pr<ROWS&&pc>=0&&pc<COLS&&board[pr][pc]===EMPTY)openL=true;
  for(let k=0;k<WIN;k++){
    const tr=r+dr*k,tc=c+dc*k;
    if(tr<0||tr>=ROWS||tc<0||tc>=COLS||board[tr][tc]!==player)break;
    count++;
  }
  const er=r+dr*count,ec=c+dc*count;
  if(er>=0&&er<ROWS&&ec>=0&&ec<COLS&&board[er][ec]===EMPTY)openR=true;
  return{count,openEnds:(openL?1:0)+(openR?1:0)};
}

function evaluatePosition(){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  const visited=new Set();
  let score=0;
  const T={ai:{two:0,three:0,threeH:0,four:0,fourH:0,five:0},hu:{two:0,three:0,threeH:0,four:0,fourH:0,five:0}};
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    for(const [dr,dc] of dirs){
      for(const p of [AI,HUMAN]){
        if(board[r][c]!==p)continue;
        const key=`${r},${c},${dr},${dc},${p}`;
        if(visited.has(key))continue;
        const{count,openEnds}=countOpen(r,c,dr,dc,p);
        for(let k=0;k<count;k++)visited.add(`${r+dr*k},${c+dc*k},${dr},${dc},${p}`);
        if(count<2||openEnds===0)continue;
        const B=p===AI?T.ai:T.hu;
        if(count>=5)B.five++;
        else if(count===4&&openEnds===2)B.four++;
        else if(count===4&&openEnds===1)B.fourH++;
        else if(count===3&&openEnds===2)B.three++;
        else if(count===3&&openEnds===1)B.threeH++;
        else if(count===2&&openEnds===2)B.two++;
      }
    }
  }
  if(T.ai.five>0)return 500000;
  if(T.hu.five>0)return -500000;
  if(T.ai.four>0)score+=200000;
  if(T.hu.four>0)score-=220000;
  if(T.ai.four>0&&T.ai.fourH>0)score+=300000;
  if(T.hu.four>0&&T.hu.fourH>0)score-=320000;
  if(T.ai.three>=2)score+=60000;
  if(T.ai.three>=1&&T.ai.threeH>=1)score+=30000;
  if(T.hu.three>=2)score-=70000;
  if(T.hu.three>=1&&T.hu.threeH>=1)score-=40000;
  score+=T.ai.four*8000+T.ai.fourH*2000+T.ai.three*1200+T.ai.threeH*300+T.ai.two*40;
  score-=T.hu.four*9000+T.hu.fourH*2200+T.hu.three*1400+T.hu.threeH*350+T.hu.two*50;
  const cx=4.5,cy=4.5;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(board[r][c]===EMPTY)continue;
    const bonus=Math.max(0,6-(Math.abs(r-cx)+Math.abs(c-cy)));
    score+=(board[r][c]===AI?1:-1)*bonus;
  }
  return score;
}

function getCandidates(){
  const set=new Set();
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(board[r][c]===EMPTY)continue;
    for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===EMPTY)set.add(nr*COLS+nc);
    }
  }
  if(set.size===0)set.add(4*COLS+5);
  return [...set].map(k=>[Math.floor(k/COLS),k%COLS]);
}

function scoreMoveQuick(r,c,player){
  let s=0;
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(const [dr,dc] of dirs){
    const{count,openEnds}=countOpen(r,c,dr,dc,player);
    if(count>=5)s+=200000;
    else if(count===4&&openEnds===2)s+=20000;
    else if(count===4&&openEnds===1)s+=5000;
    else if(count===3&&openEnds===2)s+=2000;
    else if(count===3&&openEnds===1)s+=500;
    else if(count===2&&openEnds===2)s+=80;
  }
  return s;
}

function orderMoves(cands){
  return cands.map(([r,c])=>{
    let s=0;
    board[r][c]=AI;s+=scoreMoveQuick(r,c,AI)*2;board[r][c]=EMPTY;
    board[r][c]=HUMAN;s+=scoreMoveQuick(r,c,HUMAN)*1.9;board[r][c]=EMPTY;
    s-=(Math.abs(r-4.5)+Math.abs(c-4.5))*2;
    return{r,c,s};
  }).sort((a,b)=>b.s-a.s).map(x=>[x.r,x.c]);
}

function minimax(depth,isMax,alpha,beta){
  const aiW=checkWin(AI),huW=checkWin(HUMAN);
  if(aiW)return 500000+depth*100;
  if(huW)return-(500000+depth*100);
  if(isDraw()||depth===0)return evaluatePosition();
  const key=boardKey()+'|'+depth+'|'+(isMax?1:0);
  if(transTable.has(key))return transTable.get(key);
  const cands=depth>=3?orderMoves(getCandidates()):getCandidates();
  let best=isMax?-INF:INF;
  for(const [r,c] of cands){
    board[r][c]=isMax?AI:HUMAN;
    const val=minimax(depth-1,!isMax,alpha,beta);
    board[r][c]=EMPTY;
    if(isMax){if(val>best)best=val;if(val>alpha)alpha=val;}
    else{if(val<best)best=val;if(val<beta)beta=val;}
    if(beta<=alpha)break;
  }
  if(transTable.size>50000)transTable.clear();
  transTable.set(key,best);
  return best;
}

function getThreatCounts(player){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  const visited=new Set();let fourOpen=0,threeOpen=0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(board[r][c]!==player)continue;
    for(const [dr,dc] of dirs){
      const key=`${r},${c},${dr},${dc}`;
      if(visited.has(key))continue;
      const{count,openEnds}=countOpen(r,c,dr,dc,player);
      for(let k=0;k<count;k++)visited.add(`${r+dr*k},${c+dc*k},${dr},${dc}`);
      if(count===4&&openEnds===2)fourOpen++;
      if(count===3&&openEnds===2)threeOpen++;
    }
  }
  return{fourOpen,threeOpen};
}

document.getElementById('reset-btn').addEventListener('click',init);
init();
</script>
</body>
</html>
