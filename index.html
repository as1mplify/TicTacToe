<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10×10 Tic-Tac-Toe — Get 4 in a row!</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cell: 56px;
    --gap: 4px;
    --bg: #f8f8f6;
    --surface: #ffffff;
    --surface2: #f1f0ec;
    --border: rgba(0,0,0,0.12);
    --text: #1a1a1a;
    --muted: #666;
    --blue: #185FA5;
    --red: #A32D2D;
    --green-bg: #C0DD97;
    --green-text: #27500A;
    --radius: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --surface: #262626;
      --surface2: #2e2e2e;
      --border: rgba(255,255,255,0.12);
      --text: #f0f0ee;
      --muted: #aaa;
      --blue: #5aa3e8;
      --red: #e07070;
    }
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  h1 { font-size: 1.5rem; font-weight: 500; margin-bottom: 0.25rem; }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; }
  #status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: calc(10 * var(--cell) + 9 * var(--gap));
    max-width: 100%;
    margin-bottom: 10px;
  }
  #status { font-size: 15px; font-weight: 500; }
  #scores { display: flex; gap: 16px; font-size: 13px; color: var(--muted); }
  #scores span { font-weight: 600; color: var(--text); }
  #board {
    display: grid;
    grid-template-columns: repeat(10, var(--cell));
    gap: var(--gap);
  }
  .cell {
    width: var(--cell); height: var(--cell);
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 500;
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }
  .cell:hover:not(.taken) { background: var(--surface); }
  .cell.taken { cursor: default; }
  .cell.x-cell { color: var(--blue); }
  .cell.o-cell { color: var(--red); }
  .cell.win-cell { background: var(--green-bg); color: var(--green-text); }
  #thinking { font-size: 12px; color: var(--muted); min-height: 18px; text-align: center; margin-top: 6px; }
  #reset-btn {
    margin-top: 14px;
    padding: 7px 24px;
    font-size: 14px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.1s;
  }
  #reset-btn:hover { background: var(--surface2); }
  @media (max-width: 620px) {
    :root { --cell: 32px; --gap: 2px; }
    .cell { font-size: 14px; }
    h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>
<h1>10×10 Tic-Tac-Toe</h1>
<p class="subtitle">Get 4 in a row to win &nbsp;·&nbsp; You are X &nbsp;·&nbsp; AI is O</p>

<div id="status-bar">
  <div id="status">Your turn (X)</div>
  <div id="scores">You: <span id="p-score">0</span> &nbsp; AI: <span id="ai-score">0</span> &nbsp; Draw: <span id="d-score">0</span></div>
</div>

<div id="board" role="grid" aria-label="10 by 10 game board"></div>
<div id="thinking" aria-live="polite"></div>
<button id="reset-btn">New game</button>

<script>
const ROWS = 10, COLS = 10, WIN = 4;
const HUMAN = 1, AI = 2, EMPTY = 0;
let board, gameOver, humanTurn, scores = {p:0, ai:0, d:0};

const boardEl = document.getElementById('board');
const statusEl = document.getElementById('status');
const thinkEl = document.getElementById('thinking');

function init() {
  board = Array.from({length: ROWS}, () => Array(COLS).fill(EMPTY));
  gameOver = false; humanTurn = true;
  renderBoard();
  statusEl.textContent = 'Your turn (X)';
  thinkEl.textContent = '';
}

function renderBoard(winCells) {
  const wSet = new Set((winCells || []).map(([r,c]) => r+','+c));
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const div = document.createElement('div');
      div.className = 'cell';
      div.setAttribute('role', 'gridcell');
      const key = r+','+c;
      if (board[r][c] === HUMAN) {
        div.textContent = 'X';
        div.classList.add('taken','x-cell');
        div.setAttribute('aria-label', `X at row ${r+1} column ${c+1}`);
      } else if (board[r][c] === AI) {
        div.textContent = 'O';
        div.classList.add('taken','o-cell');
        div.setAttribute('aria-label', `O at row ${r+1} column ${c+1}`);
      } else {
        div.setAttribute('aria-label', `Empty row ${r+1} column ${c+1}`);
      }
      if (wSet.has(key)) div.classList.add('win-cell');
      div.dataset.r = r; div.dataset.c = c;
      div.addEventListener('click', onCellClick);
      boardEl.appendChild(div);
    }
  }
}

function onCellClick(e) {
  if (!humanTurn || gameOver) return;
  const r = +e.currentTarget.dataset.r, c = +e.currentTarget.dataset.c;
  if (board[r][c] !== EMPTY) return;
  board[r][c] = HUMAN;
  const win = checkWin(HUMAN);
  if (win) { renderBoard(win); endGame('You win! 🎉', 'p'); return; }
  if (isDraw()) { renderBoard(); endGame("It's a draw!", 'd'); return; }
  renderBoard();
  humanTurn = false;
  statusEl.textContent = 'AI is thinking…';
  thinkEl.textContent = '(calculating best move)';
  setTimeout(aiMove, 80);
}

function aiMove() {
  const move = getBestMove();
  if (!move) return;
  board[move[0]][move[1]] = AI;
  const win = checkWin(AI);
  if (win) { renderBoard(win); endGame('AI wins! 🤖', 'ai'); return; }
  if (isDraw()) { renderBoard(); endGame("It's a draw!", 'd'); return; }
  renderBoard();
  humanTurn = true;
  thinkEl.textContent = '';
  statusEl.textContent = 'Your turn (X)';
}

function endGame(msg, key) {
  gameOver = true;
  scores[key]++;
  document.getElementById('p-score').textContent = scores.p;
  document.getElementById('ai-score').textContent = scores.ai;
  document.getElementById('d-score').textContent = scores.d;
  statusEl.textContent = msg;
  thinkEl.textContent = '';
}

function isDraw() {
  return board.every(row => row.every(c => c !== EMPTY));
}

function checkWin(player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c] !== player) continue;
      for (const [dr, dc] of dirs) {
        const cells = [[r, c]];
        for (let k = 1; k < WIN; k++) {
          const nr = r + dr*k, nc = c + dc*k;
          if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS || board[nr][nc] !== player) break;
          cells.push([nr, nc]);
        }
        if (cells.length === WIN) return cells;
      }
    }
  }
  return null;
}

function scoreWindow(window, player) {
  const opp = player === AI ? HUMAN : AI;
  const mine = window.filter(v => v === player).length;
  const them = window.filter(v => v === opp).length;
  const empty = window.filter(v => v === EMPTY).length;
  if (them > 0 && mine > 0) return 0;
  if (mine === 4) return 100000;
  if (mine === 3 && empty === 1) return 500;
  if (mine === 2 && empty === 2) return 20;
  if (mine === 1 && empty === 3) return 2;
  return 0;
}

function scoreBoard() {
  let score = 0;
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      for (const [dr, dc] of dirs) {
        const win = [];
        for (let k = 0; k < WIN; k++) {
          const nr = r + dr*k, nc = c + dc*k;
          if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) break;
          win.push(board[nr][nc]);
        }
        if (win.length < WIN) continue;
        score += scoreWindow(win, AI);
        score -= scoreWindow(win, HUMAN) * 1.1;
      }
    }
  }
  return score;
}

function getCandidates() {
  const set = new Set();
  const radius = 2;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c] === EMPTY) continue;
      for (let dr = -radius; dr <= radius; dr++) {
        for (let dc = -radius; dc <= radius; dc++) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === EMPTY)
            set.add(nr + ',' + nc);
        }
      }
    }
  }
  if (set.size === 0) { set.add('4,4'); set.add('5,5'); }
  return [...set].map(s => s.split(',').map(Number));
}

function minimax(depth, isMax, alpha, beta) {
  const aiWin = checkWin(AI), huWin = checkWin(HUMAN);
  if (aiWin) return 100000 + depth;
  if (huWin) return -(100000 + depth);
  if (depth === 0 || isDraw()) return scoreBoard();
  const cands = getCandidates();
  if (isMax) {
    let best = -Infinity;
    for (const [r, c] of cands) {
      board[r][c] = AI;
      best = Math.max(best, minimax(depth-1, false, alpha, beta));
      board[r][c] = EMPTY;
      alpha = Math.max(alpha, best);
      if (beta <= alpha) break;
    }
    return best;
  } else {
    let best = Infinity;
    for (const [r, c] of cands) {
      board[r][c] = HUMAN;
      best = Math.min(best, minimax(depth-1, true, alpha, beta));
      board[r][c] = EMPTY;
      beta = Math.min(beta, best);
      if (beta <= alpha) break;
    }
    return best;
  }
}

function getBestMove() {
  const filled = board.flat().filter(v => v !== EMPTY).length;
  if (filled === 0) return [4, 5];

  const cands = getCandidates();

  // Win immediately
  for (const [r, c] of cands) {
    board[r][c] = AI;
    if (checkWin(AI)) { board[r][c] = EMPTY; return [r, c]; }
    board[r][c] = EMPTY;
  }
  // Block human win
  for (const [r, c] of cands) {
    board[r][c] = HUMAN;
    if (checkWin(HUMAN)) { board[r][c] = EMPTY; return [r, c]; }
    board[r][c] = EMPTY;
  }

  const depth = cands.length > 20 ? 2 : 3;
  let best = -Infinity, bestMove = cands[0];
  for (const [r, c] of cands) {
    board[r][c] = AI;
    const val = minimax(depth, false, -Infinity, Infinity);
    board[r][c] = EMPTY;
    if (val > best) { best = val; bestMove = [r, c]; }
  }
  return bestMove;
}

document.getElementById('reset-btn').addEventListener('click', init);
init();
</script>
</body>
</html>
